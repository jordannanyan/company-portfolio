  <text x="80" y="590" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="18" letter-spacing="2" fill="rgba(255,255,255,0.65)">wa.me/6282253092438</text>
  <text x="1120" y="590" text-anchor="end" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="18" letter-spacing="2" fill="rgba(255,255,255,0.65)">@webdevpky</text>
