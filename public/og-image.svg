  <text x="80" y="225" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="18" letter-spacing="6" fill="rgba(255,255,255,0.65)" font-weight="500">SKRIPSI · TUGAS · WEB · MOBILE · ERP</text>

  <!-- Headline -->
